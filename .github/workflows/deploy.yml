name: Deploy Frontend

on:
  push:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: deploy-frontend
  cancel-in-progress: false

jobs:
  build:
    name: Build & Verify
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Next.js
        run: pnpm run build

  deploy:
    name: Deploy to Server
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: deploy
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script_stop: true
          script: |
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && source "$NVM_DIR/nvm.sh"

            cd /home/deploy/flowoid_stock_frontend

            # Save current commit for rollback
            PREV_COMMIT=$(git rev-parse HEAD)

            git pull origin master

            pnpm install --frozen-lockfile

            # Build Next.js (standalone output)
            NODE_ENV=production pnpm run build

            # Copy static files for standalone output
            cp -r .next/static .next/standalone/.next/static
            cp -r public .next/standalone/public

            # Restart the app via PM2
            pm2 reload ecosystem.config.js --only flowoid-frontend --update-env

            # Health check: 6 attempts, 5 seconds apart
            for i in $(seq 1 6); do
              sleep 5
              STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3001)
              if [ "$STATUS" = "200" ]; then
                echo "Deploy successful!"
                exit 0
              fi
              echo "Attempt $i/6: got $STATUS..."
            done

            echo "Health check failed! Rolling back..."
            git reset --hard "$PREV_COMMIT"
            pnpm install --frozen-lockfile
            NODE_ENV=production pnpm run build
            cp -r .next/static .next/standalone/.next/static
            cp -r public .next/standalone/public
            pm2 reload ecosystem.config.js --only flowoid-frontend --update-env
            echo "Rolled back to $PREV_COMMIT"
            exit 1
